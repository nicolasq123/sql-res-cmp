name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Go mod tidy
        run: go mod tidy

      - name: Build
        run: go build -o diffq ./cmd

      - name: Test
        run: go test ./... -v -cover
